# =============================================================================
#  LLM pricing table — single source of truth for cost calculation.
#  Prices are in USD per 1,000,000 tokens. Edit freely; no code changes needed.
#  Adding a new provider/model is a data change here, not a code change.
#  Unknown (provider, model) pairs fall back to `default` below.
# =============================================================================
currency: USD

default:
  input_per_1m: 1.00
  output_per_1m: 3.00

providers:
  openai:
    gpt-4.1-mini:
      input_per_1m: 0.40
      output_per_1m: 1.60
    gpt-4.1:
      input_per_1m: 2.00
      output_per_1m: 8.00
    gpt-4o-mini:
      input_per_1m: 0.15
      output_per_1m: 0.60
    gpt-4o:
      input_per_1m: 2.50
      output_per_1m: 10.00

  anthropic:
    claude-opus-4-8:
      input_per_1m: 15.00
      output_per_1m: 75.00
    claude-sonnet-4-6:
      input_per_1m: 3.00
      output_per_1m: 15.00
    claude-haiku-4-5:
      input_per_1m: 1.00
      output_per_1m: 5.00
